<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warm lamplight glow -->
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#c9a84c" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampGlowSmall" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#c9a84c" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <!-- Moon glow -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8d48b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e8d48b" stop-opacity="0"/>
    </radialGradient>
    <!-- Mist -->
    <linearGradient id="mistFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0604" stop-opacity="0"/>
      <stop offset="40%" stop-color="#1a1410" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0604" stop-opacity="0"/>
    </linearGradient>
    <!-- Window warm light -->
    <radialGradient id="windowLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8a6d2b" stop-opacity="0.08"/>
    </radialGradient>
    <!-- Subtle star twinkle -->
    <filter id="starSoft">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- ===== SKY / STARS ===== -->
  <!-- Moon with glow -->
  <circle cx="1620" cy="120" r="120" fill="url(#moonGlow)"/>
  <path d="M1620,80 a32,32 0 1,1 0,64 a26,26 0 1,0 0,-64z" fill="#e8d48b" opacity="0.07"/>

  <!-- Stars scattered -->
  <g filter="url(#starSoft)" opacity="0.4">
    <circle cx="200" cy="60" r="1.2" fill="#e8d48b"/><circle cx="350" cy="130" r="0.8" fill="#e8d48b"/>
    <circle cx="520" cy="45" r="1.0" fill="#e8d48b"/><circle cx="680" cy="95" r="1.4" fill="#e8d48b"/>
    <circle cx="830" cy="55" r="0.9" fill="#e8d48b"/><circle cx="990" cy="120" r="1.1" fill="#e8d48b"/>
    <circle cx="1100" cy="40" r="1.3" fill="#e8d48b"/><circle cx="1250" cy="80" r="0.7" fill="#e8d48b"/>
    <circle cx="1400" cy="150" r="1.0" fill="#e8d48b"/><circle cx="1500" cy="60" r="1.2" fill="#e8d48b"/>
    <circle cx="1750" cy="90" r="0.9" fill="#e8d48b"/><circle cx="1850" cy="170" r="1.1" fill="#e8d48b"/>
    <circle cx="100" cy="180" r="0.8" fill="#e8d48b"/><circle cx="450" cy="200" r="1.0" fill="#e8d48b"/>
    <circle cx="750" cy="170" r="0.6" fill="#e8d48b"/><circle cx="1320" cy="30" r="1.3" fill="#e8d48b"/>
    <circle cx="60" cy="100" r="1.0" fill="#e8d48b"/><circle cx="1680" cy="200" r="0.8" fill="#e8d48b"/>
    <circle cx="280" cy="240" r="0.7" fill="#e8d48b"/><circle cx="1050" cy="190" r="0.9" fill="#e8d48b"/>
  </g>
  <!-- Twinkling stars (animated) -->
  <g opacity="0.3">
    <circle cx="400" cy="80" r="1.2" fill="#e8d48b">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="140" r="1.0" fill="#e8d48b">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1550" cy="50" r="1.3" fill="#e8d48b">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1200" cy="100" r="0.9" fill="#e8d48b">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== DISTANT CASTLE (Hogwarts-like) ===== -->
  <g opacity="0.06" fill="#c9a84c">
    <!-- Main castle body -->
    <path d="M760,520 L760,380 L780,380 L780,300 L790,300 L790,260 L800,240 L810,260 L810,300 L820,300 L820,380 L840,380 L840,420 L860,420 L860,350 L870,350 L870,280 L878,250 L880,220 L882,250 L890,280 L890,350 L900,350 L900,420 L920,420 L920,380 L940,380 L940,320 L950,320 L950,270 L958,240 L960,210 L962,240 L970,270 L970,320 L980,320 L980,380 L1000,380 L1000,420 L1020,420 L1020,360 L1030,360 L1030,300 L1038,270 L1040,240 L1042,270 L1050,300 L1050,360 L1060,360 L1060,420 L1080,420 L1080,380 L1100,380 L1100,440 L1120,440 L1120,520"/>
    <!-- Towers / turrets -->
    <rect x="794" y="240" width="12" height="30" rx="6"/>
    <rect x="874" y="200" width="12" height="40" rx="6"/>
    <rect x="954" y="190" width="12" height="40" rx="6"/>
    <rect x="1034" y="220" width="12" height="35" rx="6"/>
    <!-- Tower caps (pointed) -->
    <polygon points="790,240 800,200 810,240"/>
    <polygon points="870,200 880,155 890,200"/>
    <polygon points="950,190 960,140 970,190"/>
    <polygon points="1030,220 1040,175 1050,220"/>
    <!-- Connecting walls -->
    <rect x="760" y="500" width="360" height="20"/>
    <!-- Castle hill -->
    <ellipse cx="940" cy="540" rx="250" ry="40"/>
  </g>

  <!-- ===== HOGSMEADE VILLAGE ===== -->
  <!-- Far row of buildings (darker, smaller) -->
  <g opacity="0.05" fill="#c9a84c">
    <!-- Left cluster -->
    <path d="M0,680 L0,620 L30,620 L30,590 L40,560 L50,590 L50,620 L80,620 L80,600 L90,570 L100,600 L100,620 L140,620 L140,580 L148,550 L150,530 L152,550 L160,580 L160,620 L200,620 L200,600 L220,600 L220,580 L228,560 L230,540 L232,560 L240,580 L240,600 L260,600 L260,680"/>
    <!-- Center cluster -->
    <path d="M500,680 L500,610 L520,610 L520,580 L528,555 L530,535 L532,555 L540,580 L540,610 L570,610 L570,590 L580,570 L590,590 L590,610 L620,610 L620,580 L630,560 L640,580 L640,610 L670,610 L670,680"/>
    <!-- Right cluster -->
    <path d="M1300,680 L1300,610 L1320,610 L1320,585 L1328,560 L1330,540 L1332,560 L1340,585 L1340,610 L1370,610 L1370,590 L1380,570 L1390,590 L1390,610 L1430,610 L1430,580 L1440,555 L1450,580 L1450,610 L1480,610 L1480,680"/>
    <!-- Far right -->
    <path d="M1700,680 L1700,615 L1720,615 L1720,590 L1730,565 L1740,590 L1740,615 L1780,615 L1780,595 L1790,575 L1800,595 L1800,615 L1840,615 L1840,680"/>
  </g>

  <!-- ===== MAIN VILLAGE ROW (foreground) ===== -->
  <g opacity="0.08" fill="#c9a84c">
    <!-- === Building 1: Crooked tall shop (left edge) === -->
    <path d="M-20,1080 L-20,700 L20,700 L20,660 L25,640 L40,620 L55,640 L60,660 L60,700 L100,700 L100,720 L120,720 L120,690 L128,665 L130,645 L132,665 L140,690 L140,720 L160,720 L160,1080Z"/>
    <!-- Chimney -->
    <rect x="32" y="600" width="14" height="30"/>
    <!-- Smoke wisps -->
    <ellipse cx="39" cy="588" rx="8" ry="4" opacity="0.5"/>
    <ellipse cx="42" cy="575" rx="6" ry="3" opacity="0.3"/>
    <!-- Windows (warm glow) -->
    <rect x="30" y="720" width="18" height="22" rx="2" fill="url(#windowLight)"/>
    <rect x="70" y="740" width="14" height="18" rx="2" fill="url(#windowLight)"/>

    <!-- === Building 2: Wide tavern === -->
    <path d="M160,1080 L160,730 L180,730 L180,700 L200,680 L280,680 L300,700 L300,730 L320,730 L320,750 L340,750 L340,1080Z"/>
    <!-- Tavern sign hanging -->
    <line x1="240" y1="730" x2="240" y2="755" stroke="#c9a84c" stroke-width="1.5" opacity="0.12"/>
    <rect x="225" y="755" width="30" height="20" rx="3" fill="#c9a84c" opacity="0.06"/>
    <!-- Windows -->
    <rect x="200" y="710" width="22" height="26" rx="3" fill="url(#windowLight)"/>
    <rect x="245" y="710" width="22" height="26" rx="3" fill="url(#windowLight)"/>
    <!-- Door -->
    <rect x="228" y="780" width="24" height="40" rx="4" fill="#c9a84c" opacity="0.04"/>

    <!-- === Building 3: Narrow leaning shop === -->
    <path d="M340,1080 L345,720 L360,700 L370,670 L378,645 L380,625 L382,645 L390,670 L400,700 L415,720 L410,1080Z"/>
    <!-- Tiny round window -->
    <circle cx="378" cy="700" r="10" fill="url(#windowLight)"/>

    <!-- === Building 4: Wide crooked building === -->
    <path d="M410,1080 L410,740 L430,740 L430,710 L440,690 L460,670 L540,670 L560,690 L570,710 L570,740 L590,740 L590,1080Z"/>
    <!-- Upper floor leans slightly -->
    <path d="M435,710 L445,660 L450,640 L455,625 L460,640 L465,660 L555,660 L560,680 L565,710Z" opacity="0.6"/>
    <!-- Chimney -->
    <rect x="470" y="610" width="12" height="32"/>
    <ellipse cx="476" cy="600" rx="7" ry="3" opacity="0.4"/>
    <!-- Windows row -->
    <rect x="450" y="700" width="16" height="20" rx="2" fill="url(#windowLight)"/>
    <rect x="485" y="700" width="16" height="20" rx="2" fill="url(#windowLight)"/>
    <rect x="520" y="700" width="16" height="20" rx="2" fill="url(#windowLight)"/>

    <!-- === Building 5: Tall narrow tower shop === -->
    <path d="M590,1080 L590,700 L610,700 L610,660 L620,630 L628,600 L630,570 L632,600 L640,630 L650,660 L650,700 L670,700 L670,1080Z"/>
    <!-- Pointed roof ornament -->
    <circle cx="630" cy="560" r="5" opacity="0.5"/>
    <!-- Windows stacked -->
    <rect x="615" y="670" width="14" height="18" rx="2" fill="url(#windowLight)"/>
    <rect x="615" y="710" width="14" height="18" rx="2" fill="url(#windowLight)"/>

    <!-- === LAMPPOST 1 === -->
    <rect x="688" y="740" width="4" height="120" rx="1"/>
    <path d="M680,740 Q690,725 700,740Z"/>
    <circle cx="690" cy="730" r="4" fill="#c9a84c" opacity="0.25"/>

    <!-- === Building 6: Large crooked inn === -->
    <path d="M720,1080 L720,720 L740,720 L740,690 L760,670 L780,655 L840,655 L860,670 L880,690 L880,720 L900,720 L900,1080Z"/>
    <!-- Second floor overhang (crooked) -->
    <path d="M730,720 L725,690 L735,660 L745,645 L835,645 L870,660 L885,690 L890,720Z" opacity="0.5"/>
    <!-- Chimney with smoke -->
    <rect x="790" y="625" width="14" height="35"/>
    <ellipse cx="797" cy="614" rx="9" ry="4" opacity="0.4"/>
    <ellipse cx="800" cy="598" rx="7" ry="3" opacity="0.2"/>
    <ellipse cx="795" cy="582" rx="5" ry="2.5" opacity="0.1"/>
    <!-- Windows -->
    <rect x="755" y="680" width="20" height="24" rx="3" fill="url(#windowLight)"/>
    <rect x="800" y="680" width="20" height="24" rx="3" fill="url(#windowLight)"/>
    <rect x="845" y="680" width="20" height="24" rx="3" fill="url(#windowLight)"/>
    <!-- Ground floor windows -->
    <rect x="755" y="740" width="20" height="24" rx="3" fill="url(#windowLight)"/>
    <rect x="845" y="740" width="20" height="24" rx="3" fill="url(#windowLight)"/>
    <!-- Door arch -->
    <path d="M800,800 L800,770 Q810,755 820,770 L820,800Z" fill="#c9a84c" opacity="0.04"/>

    <!-- === Building 7: Winding shop === -->
    <path d="M900,1080 L900,730 L920,730 L920,700 L935,680 L945,660 L950,640 L955,660 L965,680 L980,700 L980,730 L1000,730 L1000,1080Z"/>
    <rect x="930" y="700" width="16" height="20" rx="2" fill="url(#windowLight)"/>

    <!-- === Building 8: Askew two-story === -->
    <path d="M1000,1080 L1005,740 L1020,740 L1025,710 L1040,690 L1100,685 L1120,700 L1125,730 L1140,730 L1135,1080Z"/>
    <rect x="1045" y="710" width="18" height="22" rx="2" fill="url(#windowLight)"/>
    <rect x="1085" y="715" width="18" height="22" rx="2" fill="url(#windowLight)"/>
    <!-- Chimney -->
    <rect x="1060" y="665" width="11" height="28"/>

    <!-- === LAMPPOST 2 === -->
    <rect x="1158" y="730" width="4" height="130" rx="1"/>
    <path d="M1150,730 Q1160,715 1170,730Z"/>
    <circle cx="1160" cy="720" r="4" fill="#c9a84c" opacity="0.25"/>

    <!-- === Building 9: Tall spire shop === -->
    <path d="M1180,1080 L1180,720 L1200,720 L1200,680 L1210,650 L1220,620 L1228,590 L1230,560 L1232,590 L1240,620 L1250,650 L1260,680 L1260,720 L1280,720 L1280,1080Z"/>
    <!-- Flag at top -->
    <line x1="1230" y1="560" x2="1230" y2="535" stroke="#c9a84c" stroke-width="1.5"/>
    <path d="M1230,535 L1248,542 L1230,549Z" fill="#c9a84c" opacity="0.5"/>
    <!-- Windows -->
    <rect x="1215" y="660" width="14" height="18" rx="2" fill="url(#windowLight)"/>
    <rect x="1215" y="700" width="14" height="18" rx="2" fill="url(#windowLight)"/>

    <!-- === Building 10: Wide end building === -->
    <path d="M1280,1080 L1280,730 L1300,730 L1300,700 L1320,680 L1400,675 L1420,690 L1430,710 L1430,730 L1450,730 L1450,1080Z"/>
    <!-- Crooked upper -->
    <path d="M1295,700 L1310,670 L1325,655 L1395,650 L1415,665 L1425,700Z" opacity="0.5"/>
    <rect x="1330" y="690" width="18" height="22" rx="2" fill="url(#windowLight)"/>
    <rect x="1370" y="690" width="18" height="22" rx="2" fill="url(#windowLight)"/>
    <!-- Chimney -->
    <rect x="1360" y="630" width="12" height="30"/>
    <ellipse cx="1366" cy="620" rx="7" ry="3" opacity="0.4"/>

    <!-- === Building 11: Far right edge === -->
    <path d="M1450,1080 L1450,740 L1470,740 L1470,710 L1485,690 L1500,675 L1540,670 L1560,680 L1570,700 L1570,730 L1590,730 L1590,1080Z"/>
    <rect x="1495" y="700" width="16" height="20" rx="2" fill="url(#windowLight)"/>
    <rect x="1530" y="700" width="16" height="20" rx="2" fill="url(#windowLight)"/>

    <!-- === Building 12: Right edge tall === -->
    <path d="M1590,1080 L1590,720 L1610,720 L1610,690 L1625,665 L1635,645 L1640,625 L1645,645 L1655,665 L1670,690 L1670,720 L1690,720 L1690,1080Z"/>
    <rect x="1625" y="700" width="14" height="18" rx="2" fill="url(#windowLight)"/>

    <!-- === LAMPPOST 3 === -->
    <rect x="1708" y="735" width="4" height="125" rx="1"/>
    <path d="M1700,735 Q1710,720 1720,735Z"/>
    <circle cx="1710" cy="725" r="4" fill="#c9a84c" opacity="0.25"/>

    <!-- === Building 13: Far right === -->
    <path d="M1740,1080 L1740,730 L1760,730 L1760,705 L1780,685 L1850,680 L1870,695 L1880,715 L1880,730 L1900,730 L1920,730 L1920,1080Z"/>
    <rect x="1780" y="705" width="18" height="22" rx="2" fill="url(#windowLight)"/>
    <rect x="1820" y="705" width="18" height="22" rx="2" fill="url(#windowLight)"/>
    <!-- Chimney -->
    <rect x="1810" y="660" width="12" height="28"/>
    <ellipse cx="1816" cy="650" rx="7" ry="3" opacity="0.35"/>
  </g>

  <!-- ===== LAMPPOST GLOWS ===== -->
  <circle cx="690" cy="730" r="60" fill="url(#lampGlow)"/>
  <circle cx="1160" cy="720" r="60" fill="url(#lampGlow)"/>
  <circle cx="1710" cy="725" r="60" fill="url(#lampGlow)"/>

  <!-- ===== MIST LAYERS ===== -->
  <rect x="0" y="620" width="1920" height="180" fill="url(#mistFade)" opacity="0.6"/>
  <ellipse cx="300" cy="720" rx="250" ry="30" fill="#1a1410" opacity="0.04"/>
  <ellipse cx="960" cy="740" rx="300" ry="35" fill="#1a1410" opacity="0.05"/>
  <ellipse cx="1600" cy="730" rx="200" ry="25" fill="#1a1410" opacity="0.04"/>

  <!-- ===== COBBLESTONE PATH hint ===== -->
  <g opacity="0.03" fill="#c9a84c">
    <ellipse cx="960" cy="900" rx="500" ry="15"/>
    <ellipse cx="960" cy="930" rx="400" ry="10"/>
  </g>

</svg>
